<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书电商选品分析看板</title>
  <script src="xhs_product_data.js"></script>
  <style>
    :root {
      --text: #111111;
      --text-2: #555555;
      --text-muted: #888888;
      --bg: #f8f8f8;
      --bg-panel: #ffffff;
      --border: #e5e5e5;
      --accent-physical: #c83b32;
      --accent-physical-light: #fef2f2;
      --accent-virtual: #5b4aa0;
      --accent-virtual-light: #f5f3ff;
      --blue: #2563eb;
      --green: #16a34a;
      --amber: #d97706;
      --r: 6px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    button { font: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 60px;
      padding: 12px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      background: var(--text);
      color: white;
      font-weight: 700;
      font-size: 12px;
      border-radius: var(--r);
    }
    .brand h1 { margin: 0; font-size: 16px; line-height: 1.15; font-weight: 600; }
    .brand p { margin: 3px 0 0; color: var(--text-muted); font-size: 12px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .tabs {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .tabs button {
      min-width: 104px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 8px 16px;
      color: var(--text-2);
      background: var(--bg-panel);
      cursor: pointer;
      transition: all .2s ease;
      font-weight: 500;
    }
    .tabs button:hover { background: var(--bg); }
    .tabs button.active.physical { background: var(--accent-physical); color: #fff; border-color: var(--accent-physical); }
    .tabs button.active.virtual { background: var(--accent-virtual); color: #fff; border-color: var(--accent-virtual); }

    .wrap { max-width: 1320px; margin: 0 auto; padding: 26px 22px 48px; }
    .panel { display: none; }
    .panel.active { display: block; animation: enter .2s ease both; }
    @keyframes enter { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 20px;
    }
    .hero-main,
    .source {
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--bg-panel);
    }
    .hero-main { padding: 24px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .eyebrow::before { content: ""; width: 24px; height: 2px; background: currentColor; }
    .hero h2 { margin: 0; max-width: 780px; font-size: 28px; line-height: 1.2; font-weight: 600; }
    .hero p { margin: 10px 0 0; max-width: 720px; color: var(--text-2); font-size: 14px; }
    .source {
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: var(--text-2);
      font-size: 12px;
    }
    .source strong { display: block; margin-bottom: 6px; color: var(--text); font-size: 13px; font-weight: 600; }
    .source-code {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-family: "Menlo", "Consolas", monospace;
      color: var(--text-muted);
      font-weight: 500;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat {
      min-height: 96px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--bg-panel);
    }
    .stat .label { color: var(--text-muted); font-size: 12px; margin-bottom: 8px; font-weight: 500; }
    .stat .value { font-size: 28px; line-height: 1; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat .sub { color: var(--text-muted); font-size: 12px; margin-top: 8px; }
    .red { color: var(--accent-physical); }
    .violet { color: var(--accent-virtual); }
    .blue { color: var(--blue); }
    .green { color: var(--green); }
    .amber { color: var(--amber); }

    .section {
      margin-bottom: 20px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--bg-panel);
      overflow: hidden;
    }
    .section-head {
      min-height: 48px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--bg);
    }
    .section-head h3 { margin: 0; display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
    .section-head h3::before {
      content: "";
      width: 10px;
      height: 10px;
      background: var(--accent-physical);
      border-radius: 2px;
    }
    .panel[data-kind="virtual"] .section-head h3::before { background: var(--accent-virtual); }
    .section-head .hint { color: var(--text-muted); font-size: 12px; text-align: right; }
    .section-body { padding: 16px; }

    .category-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .category-card {
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--bg-panel);
      padding: 16px;
      min-width: 0;
      transition: all .2s ease;
    }
    .category-card:hover { border-color: var(--accent-physical); }
    .panel[data-kind="virtual"] .category-card:hover { border-color: var(--accent-virtual); }
    .category-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .category-top h4 { margin: 0; font-size: 16px; line-height: 1.2; font-weight: 600; }
    .category-top .meta { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
    .category-badge {
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--text-2);
      background: var(--bg);
      font-size: 11px;
      white-space: nowrap;
      font-weight: 500;
    }
    .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-bottom: 13px; }
    .metric { border-top: 1px solid var(--border); padding-top: 8px; min-width: 0; }
    .metric .k { color: var(--text-muted); font-size: 11px; }
    .metric .v { margin-top: 2px; font-weight: 700; font-size: 13px; word-break: keep-all; }
    .price-bands { display: grid; gap: 7px; }
    .band { display: grid; grid-template-columns: 80px minmax(0, 1fr) 58px; gap: 9px; align-items: center; }
    .band .name { color: var(--text-2); font-size: 12px; text-align: right; }
    .track {
      height: 16px;
      border-radius: 999px;
      background: var(--bg);
      overflow: hidden;
    }
    .fill { height: 100%; border-radius: 999px; background: var(--accent-physical); opacity: 0.8; }
    .panel[data-kind="virtual"] .fill { background: var(--accent-virtual); }
    .band .num { color: var(--text-muted); font-size: 12px; text-align: right; font-variant-numeric: tabular-nums; }
    .keywords { margin-top: 11px; color: var(--text-2); font-size: 12px; }

    .aux-grid { display: grid; grid-template-columns: 360px minmax(0, 1fr); gap: 14px; }
    .bar-list { display: grid; gap: 9px; }
    .bar { display: grid; grid-template-columns: 88px minmax(0, 1fr) 70px; gap: 8px; align-items: center; }
    .bar .name { color: var(--text-2); font-size: 12px; text-align: right; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .bar .num { color: var(--text-muted); font-size: 12px; text-align: right; }

    .kw-cloud { display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
    .kw {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--bg);
      color: var(--text-2);
      font-size: 12px;
      font-weight: 500;
    }
    .kw.hot.physical { color: var(--accent-physical); background: var(--accent-physical-light); border-color: var(--accent-physical-light); }
    .kw.hot.virtual { color: var(--accent-virtual); background: var(--accent-virtual-light); border-color: var(--accent-virtual-light); }

    .growth-block { margin-bottom: 18px; }
    .growth-block:last-child { margin-bottom: 0; }
    .growth-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-bottom: 0;
      border-radius: var(--r) var(--r) 0 0;
    }
    .growth-title h4 { margin: 0; font-size: 14px; font-weight: 600; }
    .growth-title span { color: var(--text-muted); font-size: 12px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 0 0 var(--r) var(--r);
      overflow: hidden;
    }
    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 12px;
    }
    th { color: var(--text-2); font-weight: 600; background: var(--bg); }
    tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: var(--bg); }
    .product-title { max-width: 680px; line-height: 1.45; }
    .product-title a { color: var(--blue); text-decoration: none; }
    .product-title a:hover { text-decoration: underline; text-underline-offset: 3px; }
    .small { color: var(--text-muted); font-size: 11px; margin-top: 3px; }
    .growth-num { font-weight: 700; color: var(--green); white-space: nowrap; font-size: 14px; }
    .rank { width: 46px; color: var(--text-muted); font-weight: 600; text-align: center; font-variant-numeric: tabular-nums; }
    td.rank {
      color: var(--text);
      font-family: "Menlo", "Consolas", monospace;
      font-size: 12px;
    }

    footer { padding: 0 20px 26px; text-align: center; color: var(--text-muted); font-size: 11px; }

    @media (max-width: 1040px) {
      .hero { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .category-grid, .aux-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 680px) {
      .topbar { align-items: stretch; flex-direction: column; padding: 12px; }
      .brand p { white-space: normal; }
      .tabs { width: 100%; }
      .tabs button { flex: 1; min-width: 0; }
      .wrap { padding: 16px 12px 36px; }
      .hero h2 { font-size: 22px; }
      .stats, .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .band, .bar { grid-template-columns: 72px minmax(0, 1fr) 54px; }
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">XHS</div>
      <div>
        <h1 id="pageTitle">小红书电商选品分析看板</h1>
        <p id="pageMeta"></p>
      </div>
    </div>
    <nav class="tabs">
      <button id="tabPhysical" class="physical active" type="button" onclick="switchPanel('physical')">实体商品</button>
      <button id="tabVirtual" class="virtual" type="button" onclick="switchPanel('virtual')">虚拟资料</button>
    </nav>
  </header>

  <main class="wrap">
    <section id="physicalPanel" class="panel active" data-kind="physical"></section>
    <section id="virtualPanel" class="panel" data-kind="virtual"></section>
  </main>

  <footer id="footer"></footer>

  <script>
    function fmtInt(value) {
      return Number(value || 0).toLocaleString('zh-CN');
    }

    function fmtMoney(value) {
      return '¥' + Math.round(Number(value || 0)).toLocaleString('zh-CN');
    }

    function switchPanel(kind) {
      document.getElementById('physicalPanel').classList.toggle('active', kind === 'physical');
      document.getElementById('virtualPanel').classList.toggle('active', kind === 'virtual');
      document.getElementById('tabPhysical').classList.toggle('active', kind === 'physical');
      document.getElementById('tabVirtual').classList.toggle('active', kind === 'virtual');
    }

    function stat(label, value, sub, cls) {
      return `<div class="stat">
        <div class="label">${label}</div>
        <div class="value ${cls || ''}">${value}</div>
        <div class="sub">${sub || ''}</div>
      </div>`;
    }

    function renderBars(items) {
      const max = Math.max(...items.map(item => item.value), 1);
      return `<div class="bar-list">${items.map(item => {
        const width = Math.max(2, item.value / max * 100);
        return `<div class="bar">
          <div class="name" title="${item.label}">${item.label}</div>
          <div class="track"><div class="fill" style="width:${width}%"></div></div>
          <div class="num">${fmtInt(item.value)}</div>
        </div>`;
      }).join('')}</div>`;
    }

    function renderPriceBands(bands) {
      const max = Math.max(...bands.map(item => item.value), 1);
      return `<div class="price-bands">${bands.map(item => {
        const width = Math.max(2, item.value / max * 100);
        return `<div class="band">
          <div class="name">${item.label}</div>
          <div class="track"><div class="fill" style="width:${width}%"></div></div>
          <div class="num">${item.ratio}</div>
        </div>`;
      }).join('')}</div>`;
    }

    function renderCategories(categories) {
      return `<div class="category-grid">${categories.map(category => `<article class="category-card">
        <div class="category-top">
          <div>
            <h4>${category.name}</h4>
            <div class="meta">${category.subCategories.join('、') || '暂无二级分类'}</div>
          </div>
          <span class="category-badge">${category.competitionLevel}</span>
        </div>
        <div class="metrics">
          <div class="metric"><div class="k">商品数</div><div class="v">${fmtInt(category.products)}</div></div>
          <div class="metric"><div class="k">店铺数</div><div class="v">${fmtInt(category.shops)}</div></div>
          <div class="metric"><div class="k">均价 / 中位价</div><div class="v">${fmtMoney(category.avgPrice)} / ${fmtMoney(category.medianPrice)}</div></div>
          <div class="metric"><div class="k">低粉爆款</div><div class="v">${category.lowFanRate}</div></div>
        </div>
        ${renderPriceBands(category.priceBands)}
        <div class="keywords">关键词：${category.keywords.join('、') || '暂无'}</div>
      </article>`).join('')}</div>`;
    }

    function renderGrowthProducts(groups) {
      return groups.map(group => `<div class="growth-block">
        <div class="growth-title">
          <h4>${group.name}</h4>
          <span>${group.products.length} 个近期增长商品</span>
        </div>
        <table>
          <thead><tr><th class="rank">序号</th><th>商品标题</th><th>近期销量增长</th><th>当前销量</th></tr></thead>
          <tbody>${group.products.map((product, index) => `<tr>
            <td class="rank">${String(index + 1).padStart(2, '0')}</td>
            <td class="product-title">
              <a href="${product.url}" target="_blank" rel="noreferrer">${product.title}</a>
              <div class="small">${product.keyword || ''}</div>
            </td>
            <td>
              <div class="growth-num">+${fmtInt(product.growth)}</div>
              <div class="small">7天 ${product.growth7 ? '+' + fmtInt(product.growth7) : '-'} · 30天 ${product.growth30 ? '+' + fmtInt(product.growth30) : '-'}</div>
            </td>
            <td>${fmtInt(product.currentSales)}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>`).join('');
    }

    function renderKeywords(keywords, kind) {
      return `<div class="kw-cloud">${keywords.map(item => `<span class="kw ${item.level} ${kind}" title="${item.category} · 销量参考 ${fmtInt(item.avgSales)}">${item.text} (${item.count})</span>`).join('')}</div>`;
    }

    function renderPanel(id, report, kind) {
      const panel = document.getElementById(id);
      const o = report.overview;
      const accent = kind === 'physical' ? 'red' : 'violet';
      panel.innerHTML = `
        <div class="hero">
          <div class="hero-main">
            <div class="eyebrow">Selection Intelligence</div>
            <h2>${report.label}选品库概览</h2>
            <p>当前版本聚焦整体商品/店铺情况、类目价格带，以及按类目拆分的近期销量增长商品。</p>
          </div>
          <div class="source">
            <div>
              <strong>统计口径</strong>
              统计区间：${report.sourceRange.start || '-'} 至 ${report.sourceRange.end || '-'}<br>
              低粉爆款：粉丝数≤5000 且商品销量≥1000
            </div>
            <div class="source-code">${kind.toUpperCase()} · ${fmtInt(o.products)} PRODUCTS</div>
          </div>
        </div>
        <div class="stats">
          ${stat('商品总数', fmtInt(o.products), `覆盖 ${o.categories} 个类目`, accent)}
          ${stat('店铺总数', fmtInt(o.shops), `平均每店 ${o.productsPerShop} 个商品`, 'blue')}
          ${stat('价格中位数', fmtMoney(o.medianPrice), `均价 ${fmtMoney(o.avgPrice)}`, 'amber')}
          ${stat('低粉爆款', fmtInt(o.lowFanBests), `占比 ${o.lowFanRate}`, accent)}
        </div>
        <div class="section">
          <div class="section-head"><h3>类目商品、店铺与价格带</h3><span class="hint">按商品数排序</span></div>
          <div class="section-body">${renderCategories(report.categories)}</div>
        </div>
        <div class="section">
          <div class="section-head"><h3>店铺基础分布与关键词</h3><span class="hint">用于判断进入门槛和内容切口</span></div>
          <div class="section-body aux-grid">
            <div>${renderBars(report.distributions.fans)}</div>
            <div>${renderKeywords(report.keywords, kind)}</div>
          </div>
        </div>
        <div class="section">
          <div class="section-head"><h3>近期销量增长商品</h3><span class="hint">按类目拆分，优先使用近7天销量增长</span></div>
          <div class="section-body">${renderGrowthProducts(report.growthByCategory)}</div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('pageTitle').textContent = DATA.meta.title;
      document.getElementById('pageMeta').textContent = `${DATA.meta.source} · 样本 ${fmtInt(DATA.meta.totalProducts)} 件 · 生成 ${DATA.meta.generated}`;
      document.getElementById('footer').textContent = DATA.meta.sampleRule;
      renderPanel('physicalPanel', DATA.physical, 'physical');
      renderPanel('virtualPanel', DATA.virtual, 'virtual');
    });
  </script>
</body>
</html>
